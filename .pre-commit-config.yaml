# Pre-commit hooks. Runs host-side (where commits happen under the wt workflow).
#
# Install: `pre-commit install` (host-side, one-time).
# Run manually: `pre-commit run --all-files`.
#
# clang-format will be added in week 2 when the first C++ in dialect/ lands.
#
# `exclude` keeps every hook off vendored submodule trees — Lighthouse
# (third_party/lighthouse) in particular is upstream code we consume
# verbatim; ruff-formatting or whitespace-fixing it would create a spurious
# local diff and defeat clean rebasing onto upstream.
#
# The Lighthouse end-to-end check (test/integration/lighthouse_smoke.py) is
# deliberately NOT a hook: it needs the multi-GB source-built MLIR stack,
# which lives in the devcontainer, not host-side where commits happen. It
# would always SKIP here and give false confidence. Run it in-container.

exclude: '^third_party/'

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.13.3
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=2000]
      - id: check-merge-conflict
