# Pre-commit hooks. Run inside the devcontainer (where the source-built MLIR
# stack and Python tooling needed by the lit/pytest hooks are available).
# Pre-commit fires when `git commit` is invoked from a shell inside the
# devcontainer.
#
# Install: `pre-commit install` (one-time, inside the devcontainer).
# Run manually: `pre-commit run --all-files`.
#
# clang-format will be added in week 2 when the first C++ in dialect/ lands.
#
# `exclude` keeps every hook off two kinds of path:
#
#  - vendored submodule trees (third_party/) — Lighthouse in particular is
#    upstream code we consume verbatim; ruff-formatting or whitespace-fixing
#    it would create a spurious local diff and defeat clean rebasing.
#
#  - generated experiment captures (experiments/**/dumps/ and
#    experiments/**/results*.json) — these are byte-faithful tool output
#    (mlir-opt IR, Inductor-generated Python, benchmark JSON). Linting or
#    eof/whitespace-fixing them corrupts their value as reproduction
#    artifacts (e.g. ruff E731 on Inductor's `fn = lambda: ...`). The
#    hand-written harness (experiments/**/run.py, run.sh) is NOT excluded
#    and stays linted.
#
# Scope of the lit and pytest hooks: the *main* project only (test/ and
# gnnc/). The experiments/ tree is deliberately not under test — each m0/m1/
# probe is a one-shot characterization with its own driver, not a regression
# target. The Lighthouse end-to-end smoke (test/integration/lighthouse_smoke.py)
# is excluded from the pytest hook because it's the heavyweight integration
# check; run it manually or in CI, not on every commit.

exclude: '^(third_party/|experiments/.+/dumps/|experiments/.+/results.*\.json)'

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.13.3
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=2000]
      - id: check-merge-conflict

  - repo: local
    hooks:
      # MLIR lit suite — discovers .mlir under test/ (see test/lit.cfg.py).
      # lit.cfg.py fatals if $LLVM_BUILD is unset; that's intentional — it
      # surfaces the wrong-environment case loudly instead of silently
      # skipping.
      - id: lit
        name: lit (test/)
        entry: lit -q test/
        language: system
        pass_filenames: false
        always_run: true

      # Pytest for the main project. Excludes the Lighthouse integration smoke
      # (slow). Tolerates exit code 5 ("no tests collected") so the hook
      # doesn't fail during early scaffolding before pytest tests exist.
      - id: pytest
        name: pytest (gnnc/ + test/, excluding integration smoke)
        entry: bash -c 'pytest -q --ignore=test/integration/lighthouse_smoke.py gnnc test; rc=$?; [ "$rc" -eq 5 ] && exit 0 || exit "$rc"'
        language: system
        pass_filenames: false
        always_run: true
