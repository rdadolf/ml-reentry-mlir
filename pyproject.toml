[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "gnnc"
version = "0.0.0"
description = "GNN ahead-of-time compiler (PyG → MLIR sparse-tensor → GPU)."
readme = "README.md"
requires-python = ">=3.11,<3.13"
license = { text = "Apache-2.0 WITH LLVM-exception" }
authors = [{ name = "Bob Adolf", email = "rdadolf@gmail.com" }]

# Core dependencies needed by harness / tooling regardless of ingress path.
# torch-mlir is built from submodule (see internal-docs/repo-setup-plan.md
# §4), not installed as a wheel.
dependencies = [
    "numpy>=1.26,<3",
    "lit>=18",
    "filecheck>=1.0.1",
]

# Install CPU torch and PyG. Used for week-1 ingress development and as a
# baseline-comparison path. Doesn't install torch-scatter / torch-sparse /
# pyg-lib — those are needed only for the PyG baseline comparison and require
# matching wheels from https://data.pyg.org/whl/ (post-install step,
# documented in README).
[project.optional-dependencies]
ingress-cpu = [
    "torch>=2.4,<3",
    "torch-geometric>=2.5",
    "ogb>=1.3",
]

# Install CUDA torch and PyG. Same caveats about torch-scatter etc. apply.
# torch CUDA wheels resolved via the explicit PyTorch index in
# [tool.uv.sources] below.
ingress-cuda = [
    "torch>=2.4,<3",
    "torch-geometric>=2.5",
    "ogb>=1.3",
]

dev = [
    "pytest>=8",
    "ruff>=0.6",
    "pre-commit>=4",
    "ipython>=8",
]

# Build-time deps for the out-of-tree LLVM/MLIR and torch-mlir builds. MLIR's
# CMake scripts inspect the active Python interpreter and require these to be
# importable. ml_dtypes is also needed at MLIR-Python load time, not just
# build time. Pinned versions track
# third_party/llvm-project/mlir/python/requirements.txt.
build = [
    "nanobind>=2.9,<3.0",
    "PyYAML>=5.4.0,<=6.0.1",
    "typing_extensions>=4.12.2",
    "ml_dtypes>=0.5.0,<=0.6.0",
]

[project.scripts]
gnnc = "gnnc.cli:main"

# uv-specific wheel index resolution.
#
# PyTorch CUDA wheels are hosted on a separate index. Use cu126 (CUDA 12.6)
# wheels because PyTorch CU13 wheels trail the toolkit release; CU12 PyTorch
# binaries run fine against the CU13 toolkit and driver on this host. Bump
# when PyTorch publishes a CU13 wheel.
#
# To install the CUDA variant:
#   uv sync --extra ingress-cuda --extra dev
[[tool.uv.index]]
name = "pytorch-cuda"
url = "https://download.pytorch.org/whl/cu126"
explicit = true

[tool.uv.sources]
torch = [
    { index = "pytorch-cuda", extra = "ingress-cuda" },
]

[tool.hatch.build.targets.wheel]
packages = ["gnnc"]

# ----- Ruff -----
[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]
ignore = ["E501"]  # handled by line-length; allow long strings/comments

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
