# cpu/passthrough — generic linalg-on-tensors → LLVM lowering for CPU.
#
# No GNN- or sparsity-specific stages yet: this is the baseline lowering
# (the same sequence Lighthouse's examples/ingress/torch/compile_model.py
# uses) that proves the gnnc → Lighthouse pipeline wiring end to end. The
# model-specific GAT/GCN/SAGE + sparse-tensor recipes are added in a later
# phase as cuda/*.yaml and cpu/*.yaml that `include:` this file.
#
# `include:` targets resolve to Lighthouse's bundled descriptors
# (lighthouse/pipeline/descriptors/) — see gnnc/recipes/__init__.py.
Pipeline:
  - pass: "func.func(llvm-request-c-wrappers)"
  - include: bufferization.yaml
  - include: bufferization_cleanup.yaml
  - pass: convert-linalg-to-loops
  - include: llvm_lowering.yaml
  - include: cleanup.yaml
